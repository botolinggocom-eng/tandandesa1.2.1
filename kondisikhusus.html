<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Data Kondisi Khusus</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.31/jspdf.plugin.autotable.min.js"></script>

<style>
:root{--primary:#0a7c6b;}
body{font-family:'Poppins', Arial;background:#f4f7fb;margin:0;padding:10px;}
#main-content{max-width:1200px;margin:auto;background:white;padding:15px;border-radius:12px;}
h3{text-align:center;color:var(--primary);font-size:18px;}
.form-item{display:flex;flex-direction:column;margin-bottom:10px;}
label{font-size:13px;margin-bottom:3px;}
input,select{padding:10px;border:1px solid #ccc;border-radius:8px;font-size:14px;width:100%;}
button{padding:10px;border:none;border-radius:8px;color:white;cursor:pointer;font-weight:600;margin-top:5px;width:100%;}
.btn-simpan{background:#0a7c6b;}
.btn-ubah{background:#fd7e14;}
.btn-tetap{background:#198754;}
.btn-filter{background:#0d6efd;}
.btn-pdf{background:#0a7c6b;}
.btn-edit{background:#ffc107;color:black;width:auto;padding:5px 8px;}
.btn-hapus{background:#dc3545;width:auto;padding:5px 8px;}
.table-wrapper{overflow-x:auto;margin-top:15px;}
table{width:100%;min-width:900px;border-collapse:collapse;font-size:12px;}
th,td{border:1px solid #ddd;padding:6px;text-align:center;}
th{background:var(--primary);color:white;position:sticky;top:0;}
</style>
</head>

<body>

<div id="main-content"></div>

<script type="module">

// 🔥 TAMBAHAN REALTIME (TANPA UBAH KODE ASLI)
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getDatabase, ref, set, remove, onValue } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSy...",
  authDomain: "tandandesa-d4116.firebaseapp.com",
  databaseURL: "https://tandandesa-d4116-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "tandandesa-d4116"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

// ===== DESA =====
const params = new URLSearchParams(window.location.search);
let desa = params.get("wilayah");
let desaFix = desa ? desa.toUpperCase() : "";

if(!desa){
alert("Desa tidak dipilih!");
window.location.href="awal.html";
}

// ===== DATA =====
const bulanList=["Januari","Februari","Maret","April","Mei","Juni","Juli","Agustus","September","Oktober","November","Desember"];
const tahunList=[2026,2027,2028,2029,2030];

const fields=[
{key:"yatim",label:"Anak Yatim"},
{key:"janda",label:"Janda >70"},
{key:"stunting",label:"Stunting"},
{key:"difabel",label:"Difabel"},
{key:"rtm_total",label:"RTM"},
{key:"desil1",label:"D1"},
{key:"desil2",label:"D2"},
{key:"desil3",label:"D3"},
{key:"desil4",label:"D4"},
{key:"desil5",label:"D5"},
{key:"desil6",label:"D6"},
{key:"desil7",label:"D7"},
{key:"desil8",label:"D8"},
{key:"rtlh",label:"RTLH"}
];

// ===== STORAGE =====
let data=JSON.parse(localStorage.getItem("dataKondisi"))||{};
if(!data[desaFix]) data[desaFix]=[];

let editIndex=null;
let modeEdit=false;

function save(){
localStorage.setItem("dataKondisi",JSON.stringify(data));
}

// 🔥 REALTIME SYNC (TAMBAHAN)
onValue(ref(db,"desa/kondisi/"+desaFix), snap=>{
  const fb = snap.val();
  if(!fb) return;

  data[desaFix] = Object.values(fb);
  save();
  render();
});

// ===== AUTO ISI =====
function autoIsi(){
const form=document.getElementById("formDesaForm");
let bulan=form.bulan.value;
let tahun=form.tahun.value;

let index=bulanList.indexOf(bulan);
if(index<=0) return;

let prev=data[desaFix].find(d=>d.bulan===bulanList[index-1] && d.tahun==tahun);

if(prev){
fields.forEach(f=>{
form[f.key].value=prev[f.key]||0;
});
}
}

// ===== FORM =====
function formDesa(){

const c=document.getElementById("main-content");

c.innerHTML=`
<h3>DATA KONDISI KHUSUS DESA ${desa}</h3>

<form id="formDesaForm">

<select name="bulan">${bulanList.map(b=>`<option>${b}</option>`)}</select>
<select name="tahun">${tahunList.map(t=>`<option>${t}</option>`)}</select>

${fields.map(f=>`<input type="number" name="${f.key}" placeholder="${f.label}">`).join('')}

<button type="submit" class="btn-simpan">SIMPAN</button>
<button type="button" onclick="modeUbah()" class="btn-ubah">UBAH DATA</button>
<button type="button" onclick="modeTetap()" class="btn-tetap">TETAP</button>

</form>

<hr>

<div class="table-wrapper">
<table>
<thead>
<tr>
<th>No</th>
<th>Bulan</th>
<th>Tahun</th>
${fields.map(f=>`<th>${f.label}</th>`).join('')}
<th>Total</th>
<th>Aksi</th>
</tr>
</thead>
<tbody id="tbDesa"></tbody>
</table>
</div>
`;

const form=document.getElementById("formDesaForm");
form.bulan.addEventListener("change", autoIsi);

// ===== SIMPAN =====
form.onsubmit=function(e){
e.preventDefault();

let obj={bulan:form.bulan.value,tahun:form.tahun.value};
fields.forEach(f=>obj[f.key]=+form[f.key].value||0);

// 🔥 KEY UNIK
let key = obj.bulan + "_" + obj.tahun;

if(modeEdit){
data[desaFix][editIndex]=obj;
modeEdit=false;
editIndex=null;
alert("Data diubah");
}else{
data[desaFix].push(obj);
}

save();

// 🔥 SIMPAN FIREBASE (TAMBAHAN)
set(ref(db,"desa/kondisi/"+desaFix+"/"+key), obj);

render();
form.reset();
};

render();
}

// ===== RENDER =====
function render(){
const tb=document.getElementById("tbDesa");
if(!tb) return;
tb.innerHTML="";

data[desaFix].forEach((r,i)=>{
let total=fields.reduce((s,f)=>s+(r[f.key]||0),0);

tb.innerHTML+=`
<tr>
<td>${i+1}</td>
<td>${r.bulan}</td>
<td>${r.tahun}</td>
${fields.map(f=>`<td>${r[f.key]}</td>`).join('')}
<td>${total}</td>
<td>
<button onclick="editRow(${i})" class="btn-edit">Edit</button>
<button onclick="deleteRow(${i})" class="btn-hapus">Hapus</button>
</td>
</tr>`;
});
}

// ===== EDIT =====
window.editRow=function(i){
const r=data[desaFix][i];
const form=document.getElementById("formDesaForm");

form.bulan.value=r.bulan;
form.tahun.value=r.tahun;
fields.forEach(f=>form[f.key].value=r[f.key]);

editIndex=i;
modeEdit=true;

window.scrollTo({top:0});
};

// ===== HAPUS =====
window.deleteRow=function(i){
if(!confirm("Hapus data?")) return;

let r=data[desaFix][i];
let key=r.bulan+"_"+r.tahun;

// 🔥 HAPUS FIREBASE (TAMBAHAN)
remove(ref(db,"desa/kondisi/"+desaFix+"/"+key));

data[desaFix].splice(i,1);
save();
render();
};

// dummy agar tidak error
function modeUbah(){ alert("Pilih Edit di tabel"); }
function modeTetap(){ alert("Gunakan auto isi bulan sebelumnya"); }

document.addEventListener("DOMContentLoaded", formDesa);

</script>

</body>
</html>
