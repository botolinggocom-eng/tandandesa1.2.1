<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Statistik Keaktifan Desa</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>
body{
font-family:'Poppins',sans-serif;
background:#f4f7f7;
margin:0;
padding:10px;
}

h2{
text-align:center;
color:#0a7c6b;
}

.container{
max-width:1000px;
margin:auto;
}

.card{
background:white;
padding:15px;
border-radius:15px;
margin-top:15px;
box-shadow:0 5px 15px rgba(0,0,0,0.1);
}

/* RANKING */
.rank-item{
display:flex;
justify-content:space-between;
padding:10px;
border-bottom:1px solid #eee;
font-size:14px;
}

.badge{
padding:4px 10px;
border-radius:10px;
color:white;
font-size:12px;
}

/* WARNA */
.aktif{background:#198754;}   /* hijau */
.kurang{background:#ffc107;color:black;} /* kuning */
.tidak{background:#dc3545;}  /* merah */

</style>
</head>

<body>

<h2>📊 Statistik Keaktifan Desa</h2>

<div class="container">

<div class="card">
<canvas id="chart"></canvas>
</div>

<div class="card">
<h3>🏆 Ranking Desa</h3>
<div id="ranking"></div>
</div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

const firebaseConfig = {
apiKey:"AIzaSy...",
authDomain:"tandandesa-d4116.firebaseapp.com",
databaseURL:"https://tandandesa-d4116-default-rtdb.asia-southeast1.firebasedatabase.app",
projectId:"tandandesa-d4116"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

// ===== DAFTAR DESA =====
const desaList=[
"BOTOLINGGO","SUMBER CANTING","GAYAM","GAYAM LOR",
"KLEKEAN","PENANG","LANAS","LUMUTAN"
];

let chart;

// ===== AMBIL DATA NOTIF =====
onValue(ref(db,"notifikasi"), snap=>{

const data = snap.val();
let hitung = {};

// init 0
desaList.forEach(d=>hitung[d]=0);

// hitung aktivitas
if(data){
Object.values(data).forEach(n=>{
let d = (n.desa||"").toUpperCase();
if(hitung[d]!==undefined){
hitung[d]++;
}
});
}

// ===== SORT RANKING =====
let ranking = Object.entries(hitung)
.sort((a,b)=>b[1]-a[1]);

renderChart(ranking);
renderRanking(ranking);

});

// ===== GRAFIK =====
function renderChart(ranking){

if(chart) chart.destroy();

chart = new Chart(document.getElementById("chart"),{
type:'bar',
data:{
labels:ranking.map(r=>r[0]),
datasets:[{
label:"Jumlah Input Data",
data:ranking.map(r=>r[1]),
backgroundColor:ranking.map(r=>{
if(r[1]>=20) return "#198754";   // aktif
if(r[1]>=10) return "#ffc107";   // sedang
return "#dc3545";                // tidak aktif
})
}]
},
options:{
responsive:true,
plugins:{
legend:{display:false}
}
}
});

}

// ===== RENDER RANKING =====
function renderRanking(ranking){

const box=document.getElementById("ranking");
box.innerHTML="";

ranking.forEach((r,i)=>{

let status="";
let cls="";

if(r[1]>=20){
status="Aktif";
cls="aktif";
}else if(r[1]>=10){
status="Cukup";
cls="kurang";
}else{
status="Tidak Aktif";
cls="tidak";
}

box.innerHTML+=`
<div class="rank-item">
<div>${i+1}. ${r[0]}</div>
<div>
<span>${r[1]} data</span>
<span class="badge ${cls}">${status}</span>
</div>
</div>
`;

});

}

</script>

</body>
</html>
